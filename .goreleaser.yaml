# GoReleaser config — https://goreleaser.com
# Run locally:  goreleaser release --snapshot --clean
# Production:   triggered by tag push via .github/workflows/release.yml
version: 2

project_name: mm

before:
  hooks:
    - go mod tidy

builds:
  - id: mm
    main: .
    binary: mm
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X github.com/carlosprados/mm/cmd.version={{.Version}}
      - -X github.com/carlosprados/mm/cmd.commit={{.Commit}}
      - -X github.com/carlosprados/mm/cmd.date={{.Date}}

archives:
  - id: mm
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - README.md
      - LICENSE*

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  use: github
  groups:
    - title: Features
      regexp: "^.*feat[(\\w)]*:+.*$"
      order: 0
    - title: Bug fixes
      regexp: "^.*fix[(\\w)]*:+.*$"
      order: 1
    - title: Refactor
      regexp: "^.*refactor[(\\w)]*:+.*$"
      order: 2
    - title: Documentation
      regexp: "^.*docs[(\\w)]*:+.*$"
      order: 3
    - title: Other
      order: 999
  filters:
    exclude:
      - "^chore"
      - "^test"
      - "^ci"
      - "Merge pull request"
      - "Merge branch"

release:
  draft: false
  prerelease: auto
  name_template: "v{{ .Version }}"
  footer: |
    ---
    **Full changelog**: https://github.com/carlosprados/mm/compare/{{ .PreviousTag }}...{{ .Tag }}
