# https://taskfile.dev
version: "3"

vars:
  BIN: bin/mm

tasks:
  default:
    desc: List available tasks
    cmds:
      - task --list
    silent: true

  tidy:
    desc: Run go mod tidy
    cmds:
      - go mod tidy

  fmt:
    desc: Format Go sources
    cmds:
      - gofmt -w .

  vet:
    desc: Run go vet
    cmds:
      - go vet ./...

  build:
    desc: Build local binary into bin/mm
    cmds:
      - mkdir -p bin
      - go build -o {{.BIN}} .

  install:
    desc: Install mm into $GOBIN
    cmds:
      - go install .

  run:
    desc: 'Run with args: task run -- channels'
    cmds:
      - go run . {{.CLI_ARGS}}

  mcp:
    desc: Start the MCP server on stdio
    cmds:
      - go run . mcp

  test:
    desc: Run tests
    cmds:
      - go test ./...

  release:check:
    desc: Validate the GoReleaser config
    cmds:
      - goreleaser check

  release:snapshot:
    desc: Build a local release without publishing
    cmds:
      - goreleaser release --snapshot --clean

  clean:
    desc: Remove build artifacts
    cmds:
      - rm -rf bin dist
